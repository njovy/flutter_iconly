name: iconly
description: Flutter package for using Iconly Icons.
version: 2.0.0
homepage: https://github.com/6thsolution/flutter_iconly

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  fonts:
    - family: IconlyBold
      fonts:
        - asset: fonts/IconlyBold.ttf
    - family: IconlyBroken
      fonts:
        - asset: fonts/IconlyBroken.ttf
    - family: IconlyLight
      fonts:
        - asset: fonts/IconlyLight.ttf
        